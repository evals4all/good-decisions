<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="title desc">
  <title id="title">Weekly good decisions path</title>
  <desc id="desc">Seven daily markers connected by a rising path with habit symbols for sleep, food, movement, and weight.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset=".52" stop-color="#dff4f0"/>
      <stop offset="1" stop-color="#fff1c8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#87ad98"/>
      <stop offset=".42" stop-color="#3b9a95"/>
      <stop offset=".72" stop-color="#d8a441"/>
      <stop offset="1" stop-color="#d96c5f"/>
    </linearGradient>
  </defs>
  <rect width="680" height="520" rx="34" fill="url(#bg)"/>
  <g stroke="#e5ded0" stroke-width="2">
    <path d="M60 110 H620"/>
    <path d="M60 210 H620"/>
    <path d="M60 310 H620"/>
    <path d="M60 410 H620"/>
  </g>
  <path d="M76 392 C144 338 171 359 234 294 C291 235 334 274 388 205 C444 133 507 172 604 92" fill="none" stroke="url(#line)" stroke-width="18" stroke-linecap="round"/>
  <g fill="#fffefa" stroke="#3b9a95" stroke-width="5">
    <circle cx="76" cy="392" r="27"/>
    <circle cx="158" cy="342" r="27"/>
    <circle cx="234" cy="294" r="27"/>
    <circle cx="312" cy="258" r="27"/>
    <circle cx="388" cy="205" r="27"/>
    <circle cx="495" cy="158" r="27"/>
    <circle cx="604" cy="92" r="27"/>
  </g>
  <g fill="#16231d" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="22" text-anchor="middle">
    <text x="76" y="400">M</text>
    <text x="158" y="350">T</text>
    <text x="234" y="302">W</text>
    <text x="312" y="266">T</text>
    <text x="388" y="213">F</text>
    <text x="495" y="166">S</text>
    <text x="604" y="100">S</text>
  </g>
  <g transform="translate(78 62)">
    <rect x="0" y="0" width="176" height="58" rx="16" fill="#16231d"/>
    <text x="22" y="36" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">streak builder</text>
  </g>
  <g transform="translate(420 360)" fill="#fffefa" stroke="#d8a441" stroke-width="3">
    <rect x="0" y="0" width="178" height="86" rx="20"/>
    <path d="M30 56 C50 36 64 62 84 42 C106 20 128 46 148 28" fill="none" stroke="#d96c5f" stroke-width="8" stroke-linecap="round"/>
    <text x="30" y="28" fill="#68766d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">rolling average</text>
  </g>
</svg>
